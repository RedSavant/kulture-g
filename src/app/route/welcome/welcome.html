<div class="container">
  <div class="content">
    <img src="/logo.png" alt="Logo" class="logo">
    <h1 class="title">Kulture G</h1>
    <p class="subtitle">L'application qui va vous rendre moins con</p>
    <div class="login-form">
      <input
        type="text"
        class="pseudo-input"
        placeholder="Ton pseudo"
        [(ngModel)]="pseudo"
        (keyup.enter)="start()"
        maxlength="20"
      />
      <button class="btn-zappy" (click)="start()" [disabled]="!pseudo.trim()">Commencer</button>
    </div>
  </div>
</div>
