<div class="app-shell">
  <section class="phone-screen">
    <header class="phone-header">
      <div class="brand-icon">
        <img src="/logo.png" alt="Kulture G" />
      </div>
      <div class="brand-copy">
        <h1>Kulture G</h1>
      </div>
    </header>

    <main class="tab-content">
      <ng-container *ngComponentOutlet="activeTab().component" />
    </main>

    <nav class="tab-bar" aria-label="Navigation principale">
      @for (tab of tabs; track tab.id) {
        <button
          type="button"
          class="tab-button"
          [class.active]="activeTabId() === tab.id"
          (click)="setActiveTab(tab.id)"
        >
          <span class="tab-icon">
            @switch (tab.id) {
              @case ('learn') {
                <svg viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M321.89 171.42C233 114 141 155.22 56 65.22c-19.8-21-8.3 235.5 98.1 332.7 77.79 71 197.9 63.08 238.4-5.92s18.28-163.17-70.61-220.58"/>
                  <path d="M173 253c86 81 175 129 292 147"/>
                </svg>
              }
              @case ('practice') {
                <svg viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-miterlimit="10">
                  <path d="M256 96V56M256 456v-40" stroke-linecap="round" stroke-linejoin="round" stroke-width="48"/>
                  <circle cx="256" cy="256" r="144"/>
                  <path d="M416 256h40M56 256h40" stroke-linecap="round" stroke-linejoin="round" stroke-width="48"/>
                </svg>
              }
              @case ('profile') {
                <svg viewBox="0 0 512 512" fill="currentColor">
                  <path d="M258.9 48C141.92 46.42 46.42 141.92 48 258.9c1.56 112.19 92.91 203.54 205.1 205.1 117 1.6 212.48-93.9 210.88-210.88C462.44 140.91 371.09 49.56 258.9 48m126.42 327.25a4 4 0 0 1-6.14-.32 124.3 124.3 0 0 0-32.35-29.59C321.37 329 289.11 320 256 320s-65.37 9-90.83 25.34a124.2 124.2 0 0 0-32.35 29.58 4 4 0 0 1-6.14.32A175.32 175.32 0 0 1 80 259c-1.63-97.31 78.22-178.76 175.57-179S432 158.81 432 256a175.32 175.32 0 0 1-46.68 119.25"/>
                  <path d="M256 144c-19.72 0-37.55 7.39-50.22 20.82s-19 32-17.57 51.93C191.11 256 221.52 288 256 288s64.83-32 67.79-71.24c1.48-19.74-4.8-38.14-17.68-51.82C293.39 151.44 275.59 144 256 144"/>
                </svg>
              }
            }
          </span>
          <span class="tab-label">{{ tab.label }}</span>
        </button>
      }
    </nav>
  </section>
</div>
